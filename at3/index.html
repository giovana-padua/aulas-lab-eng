<body>
    <section class="content">
        <h1 class="title">Formulário de Cadastro:</h1>
        <form class="sign_up" id="form">
            <div>
                <label class="title_form" for="iname">Nome:</label>
                <input onblur="verificarConteudo(this)" id="iname" class="input_form" type="text" name="iname" placeholder="Digite seu nome completo">
            </div>
    
            <div class="two_inputs">
                <div>
                    <label class="title_form" for="iemail">Email:</label>
                    <input onblur="verificarConteudo(this)" id="iemail" class="input_form" type="email" name="iemail" placeholder="fulano.com">
                </div>
                
                <div>
                    <label class="title_form" for="idate">Data nascimento:</label>
                    <input onblur="verificarConteudo(this)" id="idate" class="input_form" type="date" name="idate" placeholder="Informe sua data de nascimento no formato aaaa-mm-dd">
                </div>
            </div>
    
            <div class="three_inputs">
                <div>
                    <label class="title_form" for="itelephone">Telefone Fixo:</label>
                    <input oninput="formatarTelefone(this)" maxlength="15" onblur="verificarConteudo(this)" id="itelephone" class="input_form" type="text" name="itelephone" placeholder="(99) 99999-9999">
                </div>
                
                <div>
                    <label class="title_form" for="ismartphone">Telefone Celular:</label>
                    <input oninput="formatarTelefone(this)" maxlength="15" onblur="verificarConteudo(this)" id="ismartphone" class="input_form" type="text" name="ismartphone" placeholder="(99) 99999-9999">
                </div>
    
                <div class="radio_buttons">
                    <label class="input_form" for="irole">
                        <input id="irole_professor" class="title_form" type="radio" name="irole" value="Professor" checked onclick="selectRole(this)">
                        Professor
                    </label>
    
                    <label class="input_form" for="irole">
                        <input id="irole_student" class="title_form" type="radio" name="irole" value="Aluno" onclick="selectRole(this)">
                        Aluno
                    </label>
                </div>
            </div>

            <div class="buttons_form">
                <button class="button_form" type="submit" onsubmit="cadastrarUsuario(this)">Enviar</button>
