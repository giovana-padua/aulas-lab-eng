<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando API</title>
</head>
<body>
    <h1>Usando D3 para gráficos</h1>
    <h3></h3>
    <div id="container"></div>

    <script type="module">
        import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

        const width = 640;
        const heigth = 400;
        const marginTop = 20;
        const marginRight = 20;
        const marginBottom = 30;
        const marginLeft = 40;

        const x = d3.scaleUtc().domain([new Date("2023-01-01"), new Date("2024-01-01")]).range([marginLeft, width - marginRight]);

        const y = d3.scaleLinear().domain([0, 100]).range([heigth - marginBottom, marginTop])

        const svg = d3.create("svg").attr("width", width).attr("height", heigth);

        svg.append("g").attr("transform", `translate(0, ${heigth - marginBottom})`).call(d3.axisBottom(x));

        svg.append("g").attr("transform", `translate(${marginLeft}, 0)`).call(d3.axisLeft(y));

        container.append(svg.node());
    </script>
</body>
</html>
