<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>React | Atividade</title>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

        // Definindo onde será mostrado o componente
        const container = document.getElementById('root')
        const root = ReactDOM.createRoot(container)

        // Variáveis com o texto o contador para a substring
        const text = 'Venha estudar na Fatec'
        let i = 0

        // Componente Letreiro
        function Letreiro({texto, indice}) {
            return (
                <div>
                    <h2>{texto.substring(0, indice)}</h2>
                </div>
            )
        }

        // Renderização de meio em meio segundo
        function render() {
            root.render(<Letreiro texto={text} indice={i} />)
            i++
        }

        setInterval(render, 500)
    </script>
</body>
</html>
